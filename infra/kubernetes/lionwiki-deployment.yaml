apiVersion: apps/v1
kind: Deployment
metadata:
  name: lionwiki
  labels:
    app: lionwiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lionwiki
  strategy:
    # Recreate requis car le PVC est ReadWriteOnce (un seul pod à la fois)
    type: Recreate
  template:
    metadata:
      labels:
        app: lionwiki
    spec:
      initContainers:
      - name: init-data
        image: farvardin4/lionwiki:latest
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          mkdir -p /data/var
          if [ ! -d /data/var/pages ]; then
            cp -a /var/www/html/var/. /data/var/
          fi
          if [ ! -f /data/config.php ]; then
            cp /var/www/html/config.php /data/config.php 2>/dev/null || true
          fi
          if [ ! -f /data/config.t2t ]; then
            cp /var/www/html/config.t2t /data/config.t2t 2>/dev/null || true
          fi
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: lionwiki
        image: farvardin4/lionwiki:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/www/html/var
          subPath: var
        - name: data
          mountPath: /var/www/html/config.php
          subPath: config.php
        - name: data
          mountPath: /var/www/html/config.t2t
          subPath: config.t2t
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: lionwiki-data
